<script>
class SmartStudentApp {
    constructor() {
        this.token = localStorage.getItem('token');
        this.user = JSON.parse(localStorage.getItem('user') || '{}');
        this.init();
    }

    init() {
        this.bindEvents();
        if (this.token) {
            this.showDashboard();
        }
    }

    bindEvents() {
        // Auth events
        document.getElementById('authForm').addEventListener('submit', (e) => this.handleLogin(e));
        document.getElementById('showSignup')?.addEventListener('click', (e) => this.showSignup(e));
        document.getElementById('signupFormInner')?.addEventListener('submit', (e) => this.handleSignup(e));
        document.getElementById('showLogin')?.addEventListener('click', (e) => this.showLogin(e));

        // Dashboard events
        document.getElementById('logoutBtn')?.addEventListener('click', () => this.logout());
        document.getElementById('attendancePhoto')?.addEventListener('change', (e) => this.handleAttendance(e));
        document.getElementById('notesFile')?.addEventListener('change', (e) => this.handleNotes(e));
        document.getElementById('generateQuiz')?.addEventListener('click', () => this.generateQuiz());
        document.getElementById('solveDoubt')?.addEventListener('click', () => this.solveDoubt());
    }

    // 🔥 FIXED: Proper API call handling
    async apiCall(endpoint, data = {}) {
        try {
            let headers = {};
            let body;

            if (data.file) {
                // File upload - no Content-Type header
                const formData = new FormData();
                formData.append(endpoint.includes('attendance') ? 'photo' : 'file', data.file);
                body = formData;
                if (this.token) {
                    headers['Authorization'] = `Bearer ${this.token}`;
                }
            } else {
                // JSON data
                headers = {
                    'Content-Type': 'application/json'
                };
                if (this.token) {
                    headers['Authorization'] = `Bearer ${this.token}`;
                }
                body = JSON.stringify(data);
            }

            const response = await fetch(`/api${endpoint}`, {
                method: 'POST',
                headers,
                body
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `HTTP ${response.status}`);
            }

            return await response.json();
        } catch (error) {
            throw new Error(error.message || 'API call failed');
        }
    }

    showStatus(message, type = 'success') {
        const status = document.getElementById('statusMsg');
        if (!status) return;
        status.textContent = message;
        status.className = `status ${type}`;
        status.style.display = 'block';
        setTimeout(() => status.style.display = 'none', 3000);
    }

    // Auth methods (unchanged)
    async handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (!response.ok) throw new Error(data.error);

            this.token = data.token;
            this.user = data.user;
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            this.showDashboard();
            this.showStatus('Login successful! Welcome back.', 'success');
        } catch (error) {
            this.showStatus(error.message, 'error');
        }
    }

    async handleSignup(e) {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const name = document.getElementById('studentName').value;

        try {
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, name })
            });
            const data = await response.json();

            if (!response.ok) throw new Error(data.error);

            this.token = data.token;
            this.user = data.user;
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            this.showDashboard();
            this.showStatus('Account created! Welcome to SmartStudent.', 'success');
        } catch (error) {
            this.showStatus(error.message, 'error');
        }
    }

    showSignup(e) {
        e.preventDefault();
        document.getElementById('authForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
    }

    showLogin(e) {
        e.preventDefault();
        document.getElementById('authForm').style.display = 'block';
        document.getElementById('signupForm').style.display = 'none';
    }

    showDashboard() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userAvatar').textContent = this.user.name.charAt(0).toUpperCase();
        document.getElementById('userName').textContent = this.user.name;
    }

    logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        location.reload();
    }

    // 🔥 FIXED: All dashboard methods
    async handleAttendance(e) {
        const file = e.target.files[0];
        if (!file) return;

        const loading = document.getElementById('attendanceLoading');
        const result = document.getElementById('attendanceResult');
        loading.style.display = 'block';
        result.style.display = 'none';

        try {
            const data = await this.apiCall('/attendance', { file });
            result.textContent = data.result;
            result.style.display = 'block';
            this.showStatus('Attendance marked successfully! ✅', 'success');
        } catch (error) {
            this.showStatus(`Attendance failed: ${error.message}`, 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    async handleNotes(e) {
        const file = e.target.files[0];
        if (!file) return;

        const loading = document.getElementById('notesLoading');
        const result = document.getElementById('notesResult');
        loading.style.display = 'block';
        result.style.display = 'none';

        try {
            const data = await this.apiCall('/notes', { file });
            result.textContent = data.result;
            result.style.display = 'block';
            this.showStatus('Notes summarized successfully! 📝', 'success');
        } catch (error) {
            this.showStatus(`Notes failed: ${error.message}`, 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    async generateQuiz() {
        const topic = document.getElementById('quizTopic').value.trim();
        if (!topic) {
            this.showStatus('Please enter a topic', 'error');
            return;
        }

        const loading = document.getElementById('quizLoading');
        const result = document.getElementById('quizResult');
        loading.style.display = 'block';
        result.style.display = 'none';

        try {
            const data = await this.apiCall('/quiz', { topic });
            result.textContent = data.result;
            result.style.display = 'block';
            this.showStatus('Quiz generated successfully! 🎯', 'success');
        } catch (error) {
            this.showStatus(`Quiz failed: ${error.message}`, 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    async solveDoubt() {
        const query = document.getElementById('doubtQuery').value.trim();
        if (!query) {
            this.showStatus('Please enter your doubt', 'error');
            return;
        }

        const loading = document.getElementById('doubtLoading');
        const result = document.getElementById('doubtResult');
        loading.style.display = 'block';
        result.style.display = 'none';

        try {
            const data = await this.apiCall('/doubt', { query });
            result.textContent = data.result;
            result.style.display = 'block';
            this.showStatus('Doubt solved! 💡', 'success');
        } catch (error) {
            this.showStatus(`Doubt solver failed: ${error.message}`, 'error');
        } finally {
            loading.style.display = 'none';
        }
    }
}

// Initialize app
const app = new SmartStudentApp();
</script>
